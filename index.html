<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finance Control Final</title>

<style>
body {
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

/* SECTION CARDS */
.card {
  background:#1c1c1c;
  padding:20px;
  margin-bottom:20px;
  border-radius:12px;
}

/* INPUT PANEL */
.input-panel {
  border:2px solid #00ff88;
  box-shadow: 0 0 15px rgba(0,255,136,0.2);
}

/* INPUT GROUP */
.input-group {
  margin-bottom:15px;
}

label {
  display:block;
  font-size:14px;
  margin-bottom:5px;
  color:#aaa;
}

input {
  padding:12px;
  width:100%;
  border-radius:8px;
  border:none;
  font-size:16px;
}

/* RESULT */
.good { color:#00ff88; font-weight:bold; }
.bad { color:#ff4d4d; font-weight:bold; }

.result-box {
  font-size:18px;
  line-height:1.6;
}
</style>

</head>
<body>

<h1>Finance Control</h1>

<!-- INPUT SECTION -->
<div class="card input-panel">
  <h2>CONTROL PANEL</h2>

  <div class="input-group">
    <label>Current Offset Balance ($)</label>
    <input id="offset" type="number" value="30000">
  </div>

  <div class="input-group">
    <label>Total Weekly Spending ($)</label>
    <input id="spend" type="number" value="600">
  </div>

</div>

<!-- RESULT -->
<div class="card">
  <h2>WEEKLY POSITION</h2>
  <div id="result" class="result-box"></div>
</div>

<script>
function calculate() {

  let offset = parseFloat(document.getElementById("offset").value) || 0;
  let spend = parseFloat(document.getElementById("spend").value) || 0;

  let weeklyRequired = 2738;
  let projected = offset - (spend * 4);

  let status = projected > 0 
    ? "<span class='good'>ON TRACK</span>" 
    : "<span class='bad'>OFF TRACK</span>";

  let output = `
    ${status}<br><br>
    Weekly Required: $${weeklyRequired}<br>
    Your Spend: $${spend}<br><br>
    Projected Offset (4 weeks): $${projected.toFixed(0)}
  `;

  document.getElementById("result").innerHTML = output;
}

document.querySelectorAll("input").forEach(i => i.addEventListener("input", calculate));

calculate();
</script>

</body>
</html>
