<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Control Final</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; padding:20px; }
    input { margin:5px 0; padding:8px; width:100%; }
    .card { background:#222; padding:15px; margin-bottom:15px; border-radius:10px; }
    .good { color:#00ff88; }
    .bad { color:#ff4d4d; }
  </style>
</head>
<body>

<h1>Finance Control (Final)</h1>

<div class="card">
  <h3>Inputs</h3>
  Offset: <input id="offset" type="number" value="30000">
  Weekly Spend: <input id="spend" type="number" value="600">
</div>

<div class="card">
  <h3>Result</h3>
  <p id="result"></p>
</div>

<script>
function calculate() {
  let offset = parseFloat(document.getElementById("offset").value) || 0;
  let spend = parseFloat(document.getElementById("spend").value) || 0;

  let required = 2738;
  let diff = offset - (spend * 4);

  let resultText = "";

  if (diff > 0) {
    resultText = "<span class='good'>ON TRACK</span><br>";
  } else {
    resultText = "<span class='bad'>OFF TRACK</span><br>";
  }

  resultText += "Projected offset in 4 weeks: $" + diff.toFixed(0);

  document.getElementById("result").innerHTML = resultText;
}

document.querySelectorAll("input").forEach(i => i.addEventListener("input", calculate));

calculate();
</script>

</body>
</html>
