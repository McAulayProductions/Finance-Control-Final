<!DOCTYPE html>
<html>
<head>
  <title>Finance Control</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; padding:20px; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; }
    .input { border:2px solid #00ff88; }
    input { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:none; }
    .good { color:#00ff88; }
    .bad { color:#ff4d4d; }
  </style>
</head>

<body>

<h1>Finance Control</h1>

<div class="card input">
  <h2>CONTROL PANEL</h2>

  <label>Current Offset</label>
  <input id="offset" value="30000">

  <label>Current Savings</label>
  <input id="savings" value="2600">

  <label>Weekly Income</label>
  <input id="income" value="3250">

  <label>Weekly Spending</label>
  <input id="spend" value="600">
</div>

<div class="card">
  <h2>RESULT</h2>
  <div id="result"></div>
</div>

<script>
function calc() {
  const offset = Number(document.getElementById('offset').value) || 0;
  const savings = Number(document.getElementById('savings').value) || 0;
  const income = Number(document.getElementById('income').value) || 0;
  const spend = Number(document.getElementById('spend').value) || 0;

  const net = income - spend;
  const future = offset + savings + (net * 4);

  const status = future > 0 
    ? "<span class='good'>ON TRACK</span>"
    : "<span class='bad'>OFF TRACK</span>";

  document.getElementById('result').innerHTML = `
    ${status}<br><br>
    Weekly Net: $${net}<br>
    4 Week Position: $${future}
  `;
}

document.querySelectorAll("input").forEach(i => i.addEventListener("input", calc));

calc();
</script>

</body>
</html>
