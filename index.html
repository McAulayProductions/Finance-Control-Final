<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Control Product</title>

<style>
body{font-family:Arial;background:#111;color:#fff;padding:12px}
.card{background:#1c1c1c;padding:16px;margin-bottom:12px;border-radius:12px}
h2{margin:0 0 10px 0}
input,select{width:100%;padding:8px;margin-top:5px;border-radius:6px;border:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.good{color:#00ff88}
.warn{color:#ffaa00}
.bad{color:#ff4d4d}
.small{opacity:.7;font-size:12px}
</style>
</head>

<body>

<h1>Finance Control</h1>

<!-- TOP COMMAND -->
<div class="card">
<h2>Today at a glance</h2>

<div id="verdict"></div>
<div id="floor"></div>
<div id="ppor"></div>
<div id="trigger"></div>

<br>

<strong>Weekly Command</strong>
<div id="command"></div>

<br>

<strong>What changes this week</strong>
<div id="changes"></div>
</div>

<!-- INPUT -->
<div class="card">
<h2>Control Panel</h2>

<label>Offset</label>
<input id="offset" value="30000">

<label>Savings</label>
<input id="savings" value="2600">

<label>Weekly Income</label>
<input id="income" value="3250">

<label>Weekly Spend</label>
<input id="spend" value="600">

<label>Build Stage</label>
<select id="stage">
<option value="0">Slab</option>
<option value="0.25">Plate Height</option>
<option value="0.5">Roof</option>
<option value="0.75">Lockup</option>
<option value="1">Complete</option>
</select>

</div>

<!-- WANDINA -->
<div class="card">
<h2>Wandina Engine</h2>

<div id="wandina"></div>

</div>

<!-- DEBUG -->
<div class="card small">
<div id="debug">Loading...</div>
</div>

<script>

function calc(){

try{

let offset=+offsetEl.value||0
let savings=+savingsEl.value||0
let income=+incomeEl.value||0
let spend=+spendEl.value||0
let stage=+stageEl.value||0

let net=income-spend
let buffer=offset+savings
let weeks=buffer/(spend||1)

let buildDebt=550000+(stage*200000)

let verdictTxt="STABLE"
let verdictClass="good"

if(weeks<4){verdictTxt="DANGER";verdictClass="bad"}
else if(weeks<8){verdictTxt="TIGHT";verdictClass="warn"}

verdict.innerHTML=`<span class="${verdictClass}">${verdictTxt}</span>`

floor.innerHTML=`Buffer weeks: ${weeks.toFixed(1)}`

let yearsCut=(buildDebt/100000)
ppor.innerHTML=`PPOR impact: ${yearsCut.toFixed(1)} years`

let triggerTxt="HOLD"
if(stage>0.7 && weeks>8) triggerTxt="SELL WINDOW"
trigger.innerHTML=triggerTxt

command.innerHTML = net>0
? "Maintain transfers. Stay disciplined."
: "Cut spending immediately."

changes.innerHTML = weeks<6
? "You are entering pressure zone"
: "System stable"

wandina.innerHTML = `
Build debt: $${buildDebt.toFixed(0)}<br>
Stage: ${stage}
`

debug.innerText="Render OK"

}catch(e){
debug.innerText=e.message
}

}

const offsetEl=document.getElementById('offset')
const savingsEl=document.getElementById('savings')
const incomeEl=document.getElementById('income')
const spendEl=document.getElementById('spend')
const stageEl=document.getElementById('stage')

document.querySelectorAll("input,select").forEach(i=>i.addEventListener("input",calc))

calc()

</script>

</body>
</html>
