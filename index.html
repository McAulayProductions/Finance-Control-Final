
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Control Mobile</title>
  <style>
    :root{
      --bg:#0f172a;
      --card:#111827;
      --card2:#1f2937;
      --text:#f8fafc;
      --muted:#94a3b8;
      --border:#334155;
      --green:#10b981;
      --amber:#f59e0b;
      --red:#ef4444;
      --blue:#3b82f6;
      --white:#ffffff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:10px;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#0f172a 0%, #111827 100%);
      color:var(--text);
    }
    .wrap{max-width:1200px;margin:0 auto}
    .hero,.card,.metric,.status-box,details{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }
    .hero,.card,.status-box{padding:14px}
    .hero{
      background:linear-gradient(135deg,#1e293b 0%, #0f172a 100%);
      border-color:#475569;
      box-shadow:0 14px 34px rgba(0,0,0,.28);
    }
    h1,h2,h3{margin:0 0 10px 0}
    .sub,.small{color:var(--muted);line-height:1.5}
    .sub{font-size:14px}
    .small{font-size:12px}
    .layout{display:grid;grid-template-columns:1fr;gap:12px}
    .stack{display:grid;gap:12px}
    .grid-2,.grid-3,.grid-4,.grid-5{display:grid;gap:10px}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .grid-5{grid-template-columns:repeat(5,minmax(0,1fr))}
    label{display:block}
    label span{display:block;margin-bottom:6px;color:var(--muted);font-size:13px;font-weight:700}
    input,select,textarea,button{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--border);
      background:#fff;
      color:#111827;
      font-size:15px;
    }
    input[readonly]{background:#e5e7eb}
    textarea{min-height:90px;resize:vertical}
    .mode-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:10px}
    .mode-row.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .mode-btn,.soft-btn{
      background:#f8fafc;
      color:#111827;
      border:1px solid #cbd5e1;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 6px 16px rgba(0,0,0,.10);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
    }
    .mode-btn:hover,.soft-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }
    .mode-btn.active{
      background:#22c55e;
      border-color:#22c55e;
      color:#052e16;
      box-shadow:0 8px 20px rgba(34,197,94,.28);
    }
    .metric{
      padding:14px;
      background:#243244;
      border-color:#475569;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .metric:hover,.card:hover,details:hover{transform:translateY(-1px)}
    .metric .label{color:var(--muted);font-size:12px;font-weight:700}
    .metric .value{margin-top:8px;font-size:24px;font-weight:800;line-height:1.08;word-break:break-word}
    .metric .note{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.4}
    .status-box{line-height:1.6}
    .status-good-box{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.5)}
    .status-warn-box{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.45)}
    .status-bad-box{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.45)}
    .status-info-box{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.45)}
    .status-good{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.5)}
    .status-warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.45)}
    .status-bad{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.45)}
    .status-info{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.45)}
    .row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-radius:12px;
      background:var(--card2);
      border:1px solid var(--border);
      margin-bottom:10px
    }
    .progress{height:12px;background:#020617;border:1px solid var(--border);border-radius:999px;overflow:hidden;margin-top:8px}
    .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#4ade80)}
    .bill-row{
      display:grid;
      grid-template-columns:1.4fr 1fr 1fr auto;
      gap:10px;
      align-items:end;
      padding:10px;
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:12px;
      margin-bottom:10px
    }
    details{padding:0;overflow:hidden}
    details > summary{
      list-style:none;
      cursor:pointer;
      padding:16px;
      font-weight:800;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#1e293b;
      color:#f8fafc;
    }
    details > summary::-webkit-details-marker{display:none}
    details .detail-body{padding:0 14px 14px 14px;border-top:1px solid var(--border)}
    .sticky-mobile{
      position:sticky;
      top:8px;
      z-index:20;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:8px;
      margin-bottom:12px
    }
    .sticky-mobile .mini{
      padding:10px 12px;
      background:#f8fafc;
      color:#111827;
      border:1px solid #cbd5e1;
      border-radius:12px;
      font-size:12px;
      font-weight:700;
      box-shadow:0 6px 16px rgba(0,0,0,.12);
    }
    .pill-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    #cardVerdict{
      border:2px solid #60a5fa;
      box-shadow:0 0 0 1px rgba(96,165,250,.35),0 10px 26px rgba(96,165,250,.18);
    }
    #cardFinal{
      border:2px solid #34d399;
      box-shadow:0 0 0 1px rgba(52,211,153,.35),0 10px 26px rgba(52,211,153,.18);
    }
    #commandCard{border:2px solid rgba(52,211,153,.55)}
    #nextCard{border:2px solid rgba(96,165,250,.55)}
    @media (min-width:950px){
      .layout{grid-template-columns:.95fr 1.05fr}
      .metric .value{font-size:28px}
      .sticky-mobile{grid-template-columns:repeat(3,minmax(0,1fr))}
    }
    @media (max-width:760px){
      .grid-2,.grid-3,.grid-4,.grid-5,.bill-row,.mode-row,.mode-row.three,.pill-row,.sticky-mobile{grid-template-columns:1fr}
      .row{flex-direction:column;align-items:flex-start}
      body{padding:8px}
    }
  </style>
</head>
<script>
(function () {
  const STEP = 0.25;
  const PPOR_DEFAULT = 5.97;
  const IP_DEFAULT = 6.39;
  const WANDINA_URL = 'wandina_dashboard.html';

  function round2(n) {
    return Math.round(n * 100) / 100;
  }

  function fireEvents(el) {
    if (!el) return;
    el.dispatchEvent(new Event('input', { bubbles: true }));
    el.dispatchEvent(new Event('change', { bubbles: true }));
    if (typeof render === 'function') render();
  }

  function ensureUiStyles() {
    if (document.getElementById('finance-helper-style')) return;

    const style = document.createElement('style');
    style.id = 'finance-helper-style';
    style.textContent = `
      .finance-float-wrap{
        position:fixed;
        right:14px;
        bottom:14px;
        z-index:9999;
        display:flex;
        flex-direction:column;
        gap:10px;
      }
      .finance-float-btn{
        border:none;
        border-radius:14px;
        padding:12px 14px;
        color:#fff;
        font-size:14px;
        font-weight:800;
        box-shadow:0 10px 25px rgba(0,0,0,0.20);
        cursor:pointer;
      }
      .finance-rate-row{
        display:flex;
        align-items:center;
        gap:8px;
        margin-top:8px;
      }
      .finance-rate-btn{
        width:42px;
        height:42px;
        border:none;
        border-radius:10px;
        background:#1f6feb;
        color:#fff;
        font-size:22px;
        font-weight:800;
        cursor:pointer;
        flex:0 0 42px;
      }
      @media (max-width:760px){
        .finance-float-wrap{
          right:10px;
          bottom:10px;
        }
      }
    `;
    document.head.appendChild(style);
  }

  function attachStepperToInput(inputId, defaultValue) {
    const input = document.getElementById(inputId);
    if (!input || input.dataset.stepperAttached === 'true') return;

    input.dataset.stepperAttached = 'true';
    input.type = 'number';
    input.step = '0.01';

    if (!input.value || isNaN(parseFloat(input.value))) {
      input.value = defaultValue.toFixed(2);
    }

    const row = document.createElement('div');
    row.className = 'finance-rate-row';

    const minus = document.createElement('button');
    minus.type = 'button';
    minus.className = 'finance-rate-btn';
    minus.textContent = '−';

    const plus = document.createElement('button');
    plus.type = 'button';
    plus.className = 'finance-rate-btn';
    plus.textContent = '+';

    input.style.flex = '1';
    input.style.minWidth = '0';
    input.style.height = '42px';
    input.style.border = '1px solid #d1d5db';
    input.style.borderRadius = '10px';
    input.style.padding = '0 12px';
    input.style.fontSize = '16px';
    input.style.fontWeight = '700';
    input.style.background = '#fff';
    input.style.color = '#111827';

    minus.onclick = function () {
      let v = parseFloat(input.value);
      if (isNaN(v)) v = defaultValue;
      v = Math.max(0, round2(v - STEP));
      input.value = v.toFixed(2);
      fireEvents(input);
    };

    plus.onclick = function () {
      let v = parseFloat(input.value);
      if (isNaN(v)) v = defaultValue;
      v = round2(v + STEP);
      input.value = v.toFixed(2);
      fireEvents(input);
    };

    const parent = input.parentNode;
    if (!parent) return;

    parent.insertBefore(row, input);
    row.appendChild(minus);
    row.appendChild(input);
    row.appendChild(plus);
  }

  function addFloatingButtons() {
    if (document.getElementById('financeFloatingTools')) return;

    const wrap = document.createElement('div');
    wrap.id = 'financeFloatingTools';
    wrap.className = 'finance-float-wrap';

    const wandinaBtn = document.createElement('button');
    wandinaBtn.type = 'button';
    wandinaBtn.className = 'finance-float-btn';
    wandinaBtn.style.background = '#111827';
    wandinaBtn.textContent = 'Wandina';
    wandinaBtn.onclick = function () {
      window.open(WANDINA_URL, '_blank');
    };

    const topBtn = document.createElement('button');
    topBtn.type = 'button';
    topBtn.className = 'finance-float-btn';
    topBtn.style.background = '#334155';
    topBtn.textContent = 'Top';
    topBtn.onclick = function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    wrap.appendChild(wandinaBtn);
    wrap.appendChild(topBtn);
    document.body.appendChild(wrap);
  }

  function init() {
    ensureUiStyles();
    attachStepperToInput('pporRate', PPOR_DEFAULT);
    attachStepperToInput('ipRate', IP_DEFAULT);
    addFloatingButtons();
    if (typeof render === 'function') render();
  }

  window.addEventListener('load', function () {
    init();
    setTimeout(init, 400);
  });
})();
</script>
