<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Control FINAL</title>

<style>
body { font-family: Arial; background:#0f1115; color:#fff; padding:15px; }
.card { background:#1c1f26; padding:15px; margin-bottom:15px; border-radius:12px; }
input, select { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:none; }
.good { color:#00ff88; }
.warn { color:#ffaa00; }
.bad { color:#ff4d4d; }
h2 { margin-top:0; }
</style>
</head>

<body>

<h1>Finance Control</h1>

<div class="card">
<h2>CONTROL</h2>

<label>Offset</label>
<input id="offset" value="30000">

<label>Savings</label>
<input id="savings" value="2600">

<label>Weekly Income</label>
<input id="income" value="3250">

<label>Weekly Spend</label>
<input id="spend" value="600">

<label>IP Stage</label>
<select id="stage">
<option value="0.1">Slab</option>
<option value="0.25">Plate Height</option>
<option value="0.4">Roof</option>
<option value="0.6">Lockup</option>
<option value="0.8">Tiling</option>
<option value="1">Complete</option>
</select>

<label>Fence Paid?</label>
<select id="fence">
<option value="0">No</option>
<option value="1">Yes</option>
</select>

<label>Sale Price (override)</label>
<input id="sale" value="800000">

<label>Income Mode</label>
<select id="mode">
<option value="1">Full Income</option>
<option value="0.8">Reduced (2027)</option>
</select>

</div>

<div class="card">
<h2>VERDICT</h2>
<div id="verdict"></div>
</div>

<div class="card">
<h2>WANDINA ENGINE</h2>
<div id="wandina"></div>
</div>

<div class="card">
<h2>PPOR KILL ENGINE</h2>
<div id="ppor"></div>
</div>

<script>

function calc(){

let offset = Number(offsetEl.value)||0;
let savings = Number(savingsEl.value)||0;
let income = Number(incomeEl.value)||0;
let spend = Number(spendEl.value)||0;

let stage = Number(stageEl.value);
let fence = Number(fenceEl.value);

let sale = Number(saleEl.value)||0;
let incomeMode = Number(modeEl.value);

let totalDebt = 553000;
let currentDebt = totalDebt * stage;

let ipRate = 0.0639;
let pporRate = 0.0592;

let weeklyInterest = (currentDebt * ipRate)/52;

let rent = fence ? 700 : 0;
let cashflow = rent - weeklyInterest;

let value = sale;
let equity = value - currentDebt;

let cgt = equity * 0.25 * incomeMode;
let net = equity - cgt;

let ppor = 560000;
let newPpor = ppor - net;

let weeklyRepay = (newPpor * pporRate)/52;

let verdict = "HOLD";
let color = "good";

if(stage >=1 && equity > 120000){
  verdict = "SELL WINDOW OPEN";
  color = "bad";
}
else if(stage >0.8){
  verdict = "WATCH";
  color = "warn";
}

document.getElementById("verdict").innerHTML = `
<span class="${color}">${verdict}</span><br><br>
Equity: $${Math.round(equity)}<br>
Cashflow: $${Math.round(cashflow)}
`;

document.getElementById("wandina").innerHTML = `
Debt: $${Math.round(currentDebt)}<br>
Interest/week: $${Math.round(weeklyInterest)}<br>
Rent: $${rent}<br>
Cashflow: $${Math.round(cashflow)}
`;

document.getElementById("ppor").innerHTML = `
New PPOR: $${Math.round(newPpor)}<br>
Weekly Repay: $${Math.round(weeklyRepay)}
`;

}

let offsetEl = document.getElementById("offset");
let savingsEl = document.getElementById("savings");
let incomeEl = document.getElementById("income");
let spendEl = document.getElementById("spend");
let stageEl = document.getElementById("stage");
let fenceEl = document.getElementById("fence");
let saleEl = document.getElementById("sale");
let modeEl = document.getElementById("mode");

document.querySelectorAll("input, select").forEach(i=>i.addEventListener("input",calc));

calc();

</script>

</body>
</html>
